<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>
<style>
    .uvw{
         background-color: darkgoldenrod;
            font-size: 20px;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: wavy;
            width: 150px;
            height: 100px;
    }
    .qrs{
         background-color: goldenrod;
            font-size: 20px;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: wavy;
            width: 150px;
            height: 100px;
    }
    .efg{
         background-color: chocolate;
            font-size: 20px;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: wavy;
            width: 150px;
            height: 100px;
    }

</style>
<body>
    <table border="2" style="width: 100vw; height: 100vh;">
        <!--1st row-->
        <tr>
            <td class="uvw">1</td>
            <td class="qrs">2</td>
            <td colspan="2" class="efg">3</td>
            
        </tr>
         <!--2nd row-->
        <tr>
            <td class="efg">4</td>
            <td colspan="3" class="uvw">5</td>
            
            
        </tr>
         <!--3rd row-->
        <tr>
            <td rowspan="3" class="qrs">6</td>
            <td class="qrs">7</td>
            <td class="efg">8</td>
            <td class="qrs">9</td>
        </tr>
         <!--4th row-->
        <tr>
            
            <td class="uvw">10</td>
            <td class="qrs">11</td>
            <td class="uvw">12</td>
        </tr>
         <!--5th row-->
        <tr>
        
            <td class="efg">13</td>
            <td class="uvw">14</td>
            <td class="qrs">15</td>
        </tr>
    </table>
</body>

</html>
