<!DOCTYPE html>

<body>
    <script>
        //iterative statement
        // => repating , recurring
        let x = 1      ;
        while(x<=100){
            console.log("Hello world" + x);
            x++;
        }
        console.log("end"+ x )

    </script>
</body>
