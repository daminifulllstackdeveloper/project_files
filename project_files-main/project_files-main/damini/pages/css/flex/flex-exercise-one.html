<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>
<style>
    .container {
        width: 80vh;
        height: 80vh;
        border-style: solid;
    }

    .column1,.column2,.column3 {
        width: 100%;
        height: 32.8%;
        border-style: solid;
    }
    .column2{
        display: flex;
        flex-direction: row;
    }

    .row1 {
        width: 50%;
        height: 100%;
        border-style: solid;
    }

    .row2 {
        width: 25%;
        height: 100%;
        border-style: solid;

    }

    .row3,.row4 {
        width: 50%;
        height: 100%;
        border-style: solid;
        
    }
</style>

<body>
    <div class="container">
        <div class="column1">
            <div class=" row1"></div>
        </div>
        <div class="column2">
            <div class="row2"></div>
            <div class="row3"></div>
        </div>
        <div class="column3">
            <div class="row4"></div>
        </div>
    </div>

</body>

</html>
