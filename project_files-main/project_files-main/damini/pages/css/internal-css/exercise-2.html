<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>
<style>
   
    .container{
        width:1000px ;
        height:1000px ;
        background-color: red;
        
    }
     .hello{
        background-color: aqua;
    }
    .border-solid{
        border-style: solid;
    }
    .upperbox{
        width:800px ;
        height:300px ;
     }
    .upperbox1{
        width:300px ;
        height:100px;
        background-color: blue;
    }
    .upperbox2{
        width:500px ;
        height:150px ;
        background-color: green;
    }
    .lowerbox{
        width:800px ;
        height:300px ;   
    }
    .lowerbox1{
        width:700px ;
        height:250px ;
        
        margin-top: 20px;
        margin-left: 50px;
        background-color: darkorange;
    }
    .lowerbox2{
        width:300px ;
        height:100px;
        background-color: blue;
    }
    .lowerbox3{
        width:300px ;
        height:100px ;
         background-color: green;
       
    }
    .upperbox,.lowerbox{
        margin-top: 150px;
        margin-left:100px ;
        background-color: yellow;
    }
    .upperbox1,.upperbox2{
          margin-top: 10px;
        margin-left: 50px;
       ;
    }
    .lowerbox2,.lowerbox3{
        
        margin-left: 100px;
        margin-top: 10px;
    }
    
</style>
<body>


    <div class="hello container border-solid ">
        <div class="upperbox border-solid">
            <div class="upperbox1"></div>
            <div class="upperbox2"></div>
        </div>

        <div class="lowerbox">
            <div class="lowerbox1">
                <div class="lowerbox2">

                </div>
                <div class="lowerbox3"></div>
            </div>
        </div>
    </div>
</body>

</html>
