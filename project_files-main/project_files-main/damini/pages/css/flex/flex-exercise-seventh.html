<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>


<body>
    <style>
          .container {
            width: 80vh;
            height: 80vh;
            border-style: solid;
            display: flex;
            flex-direction: row;
        }
        .left,.right{
            width: 50%;
            height: 100%;
            border-style: solid;
        }
        .lefttop{
            width: 100%;
            height: 48%;
            border-style: solid;
            display: flex;
            flex-direction: row;

        }
        .leftmiddel,.leftbottom{
            width: 100%;
            height: 25%;
            border-style: solid; 
        }
        .topleft,.topright{
            width: 50%;
            height: 100%;
            border-style: solid; 
        }
        .first{
            width: 100%;
            height: 50%;
            border-style: solid;
        }
        .righttop{
            width: 100%;
            height: 40%;
            border-style: solid;
            display: flex;
            flex-direction: row;
        }
        .rightbottom{
             width: 100%;
            height: 59%;
            border-style: solid;
             display: flex;
            flex-direction: column;
        }
        .second,.third{
             width: 50%;
            height: 100%;
            border-style: solid;
        }
        .forth,.fifth{
             width: 50%;
            height: 100%;
            border-style: solid; 
        }
    </style>
    <div class="container">
        <div class="left">
            <div class="lefttop">
                <div class="topleft">
                    <div class="first"></div>
                </div>
                <div class="topright"></div>
            </div>
            <div class="leftmiddel"></div>
            <div class="leftbottom"></div>
        </div>
        <div class="right">
            <div class="righttop">
                <div class="second"></div>
                <div class="third"></div>
            </div>
            <div class="rightbottom">
                <div class="forth"></div>
                <div class="fifth"></div>
            </div>
        </div>
    </div>
</body>

</html>
