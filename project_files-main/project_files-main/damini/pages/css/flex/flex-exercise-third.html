<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>
<style>
    .container {
        width: 80vh;
        height: 80vh;
        border-style: solid;
        display: flex;
        flex-direction: row;
    }

    .row1 {
        width: 60%;
        height: 100%;
        border-style: solid;
        display: flex;
        flex-direction: column;
    }

    .row2,
    .row3 {
        width: 20%;
        height: 100%;
        border-style: solid;
    }

    .box1 {
        width: 100%;
        height: 33%;
        border-style: solid;
    }

    .box2 {
        width: 100%;
        height: 40%;
        border-style: solid;
    }

    .column1,
    .column2,
    .column3 {
        width: 100%;
        height: 33.3%;
        border-style: solid;
    }

    .box3 {
        width: 50%;
        height: 100%;
        border-style: solid;
    }
</style>

<body>
    <div class="container">
        <div class="row1">
            <div class="column1"></div>
            <div class="column2">
                <div class="box3"></div>
            </div>
            <div class="column3"></div>
        </div>
        <div class="row2">
            <div class="box1"></div>
        </div>
        <div class="row3">
            <div class="box2"></div>
        </div>
    </div>
    <br>

</body>

</html>
