            font-size: 20px;
            text-align: center;
            text-decoration: underline;
            text-decoration-style: wavy;
            width: 150px;
            height: 100px;
        }
        
       
    </style>
</head>

    <table border="2" style="width: 100vw; height: 100vh;">
        <!--1st row-->
        <tr>
        <td class="xyz" style="background-color: brown;">Damini</td>
        <td colspan="2" class="abc"></td>
        
        </tr>
         <!--2nd row-->
        <tr>
        <td class="xyz">damini</td>
        <td class="xyz"></td>
        <td class="abc">damini</td>
        </tr>
         <!--3rd row-->
        <tr>

        <td colspan="2" rowspan="2" class="xyz">abc</td>
        
        </tr>
         <!--4th row-->
        <tr>
        
        
        </tr>
    </table>
