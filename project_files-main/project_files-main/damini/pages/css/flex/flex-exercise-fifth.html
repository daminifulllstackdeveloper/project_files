<!DOCTYPE html>
<html>

<body>
    <style>
        .container {
            width: 80vh;
            height: 80vh;
            border-style: solid;
            display: flex;
            flex-direction: column;
        }

        .a,
        .b {
            width: 100%;
            height: 50%;
            border-style: solid;
            display: flex;
            flex-direction: row;

        }

        .i,
        .j {
            width: 50%;
            height: 100%;
            border-style: solid;
            display: flex;
            flex-direction: column;
        }

        .x,
        .y {
            width: 100%;
            height: 50%;
            border-style: solid;
            display: flex;
            flex-direction: row;
        }

        .k {
            width: 50%;
            height: 100%;
            border-style: solid;
        }

        .m,
        .n {
            width: 50%;
            height: 100%;
            border-style: solid;
            display: flex;
            flex-direction: row;
        }

        .E,
        .F,
        .g,
        .h {
            width: 50%;
            height: 100%;
            border-style: solid;
        }

        .second,
        .third {
            width: 100%;
            height: 20%;
            border-style: solid;
        }

        .first {
            width: 50%;
            height: 20%;
            border-style: solid;

        }

        .F {
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
        }

    <div class="container">
        <div class="a">
            <div class="i">
                <div class="x">
                    <div class="k"></div>
                </div>
                <div class="y"></div>
            </div>
            <div class="j"></div>
        </div>
        <div class="b">
            <div class="m">
                <div class="E"></div>
                <div class="F">
                    <div class="first"></div>
                </div>
            </div>
            <div class="n">
                <div class="g">
                    <div class="second"></div>
                </div>
                <div class="h">
                    <div class="third"></div>
                </div>
            </div>
        </div>

    </div>
</body>

</html>
