<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>

<body>
    <style>
        .container {
            width: 80vh;
            height: 80vh;
            border-style: solid;
            display: flex;
            flex-direction: row;
        }
        .first{
            width:40% ;
            height: 100%;
            border-style: solid;
             display: flex;
            justify-content:center;
            align-items: end;
        }
        .a{
            width:20%;
            height:30% ;
            border-style:solid ;  
        }
        .second{
            width:60%;
            height:100% ;
            border-style:solid ;
           
        }
        .x,.y{
            width:100%;
            height:49% ;
            border-style:solid ;
        }
        .x{
          display: flex;
            justify-content: flex-end;   
        }
        .y,.E{
            display: flex;
            flex-direction: row;
        }
        .E,.F{
           width:50%;
            height:100% ;
            border-style:solid ;  
        }
        .E{
            display: flex;
            justify-content: flex-end;
        }
        .q,.r,.s,.i{
            width:20%;
            height:30% ;
            border-style:solid ; 
        }
    </style>
    <div class="container">
        <div class="first">
            <div class="a"></div>
        </div>
        <div class="second">
            <div class="x">
                <div class="i"></div>
            </div>
            <div class="y">
                <div class="E">
                    <div class="q"></div>
                    <div class="r"></div>
                </div>
                <div class="F">
                    <div class="s"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
