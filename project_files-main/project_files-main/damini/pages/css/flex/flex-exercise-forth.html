<!DOCTYPE html>
<html>

<head>
    <title>

    </title>
</head>
<style>
    .container {
        width: 80vh;
        height: 80vh;
        border-style: solid;
        display: flex;
        flex-direction: row;
    }

    .column1 {
        width: 20%;
        height: 100%;
        border-style: solid;

    }

    .column2 {
        width: 80%;
        height: 100%;
        border-style: solid;
    }
.row1,.row3{
    display: flex;
    flex-direction: row;
}
    .row1,
    .row2,
    .row3,
    .row4 {
        width: 100%;
        height: 24.4%;
        border-style: solid;
    }

    .box1 {
        width: 30%;
        height: 100%;
        border-style: solid;
    }

    .box2 {
        width: 30%;
        height: 100%;
        border-style: solid;
        margin-left: 38%;
    }
    .box3 {
        width: 38.2%;
        height: 100%;
        border-style: solid;
       margin-left: 30.2%;
    }
</style>

<body>
    <div class="container">
        <!--1st-->
        <div class="column1"></div>
        <div class="column2">
           <!--2nd-->  
            <div class="row1">
                <div class="box1"></div>
                <div class="box2"></div>
            </div>
            <!---->
            <div class="row2">
                <div class="box3"></div>
            </div>
            <!---->
            <div class="row3">
                <div class="box1"></div>
                <div class="box2"></div>
            </div>
            <!---->
            <div class="row4">
                <div class="box3"></div>
            </div>
        </div>

    </div>
</body>

</html>
